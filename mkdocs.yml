site_name: ArcHub CMS
site_description: Standalone headless CMS, content builder and delivery API.
site_url: https://archub-cms.github.io/archub_cms/
repo_url: https://github.com/archub-cms/archub_cms
repo_name: archub-cms/archub_cms
copyright: Copyright &copy; 2026 ArcHub contributors

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: amber
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - content.code.copy

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Advanced CMS Refactor: architecture/advanced-cms-refactor.md
  - CMS Capability Matrix: architecture/capability-matrix.md
  - Publishing & Workflow: architecture/publishing-workflow.md
  - Runtime & Data: architecture/runtime-and-data.md
  - Diagrams & Models: architecture/diagrams.md
  - Content Builder: content-builder.md
  - Delivery API: delivery-api.md
  - Delivery Contracts: architecture/delivery-contracts.md
  - GitHub Demo: demo-site.md
  - Release Notes: release-notes.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
